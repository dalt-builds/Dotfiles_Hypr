# ─────────────────────────────────────────────────
#  kitty.conf
# ─────────────────────────────────────────────────

# ── Fuente ──────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.5
adjust_line_height  0
adjust_column_width 0

# ── Base ────────────────────────────────────────
background              #1e1e2e
foreground              #cdd6f4
background_opacity      0.75

# ── Selección ───────────────────────────────────
selection_foreground    #0b0b0c
selection_background    #7f8c94

# ── ANSI normal (0–7) ───────────────────────────
color0  #161618
color1  #6e6e73
color2  #7a7a80
color3  #8c8c92
color4  #7aa2b8   # azul catppuccin muted
color5  #8a84a6   # lila suave
color6  #7fa3a8   # teal grisáceo
color7  #cfcfd2

# ── ANSI brillante (8–15) ───────────────────────
color8  #2a2a2e
color9  #8a8a90
color10 #9a9aa1
color11 #b0b0b6
color12 #9ec1d4
color13 #a29dbd
color14 #9fc4c9
color15 #ececef

# ── Cursor ──────────────────────────────────────
cursor                  #a6c0cf
cursor_text_color       #0b0b0c

# ── URL ─────────────────────────────────────────
url_color               #8ecae6
url_style               curly
open_url_with           default

# ── Ventana ──────────────────────────────────────
window_padding_width    12
window_border_width     1px
active_border_color     #3a3a3a
inactive_border_color   #222222
draw_minimal_borders    yes
hide_window_decorations yes
remember_window_size    no
initial_window_width    920
initial_window_height   580

# ── Pestaña (tab bar) ────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1
active_tab_foreground   #e8e8e8
active_tab_background   #222222
active_tab_font_style   bold
inactive_tab_foreground #666666
inactive_tab_background #111111
inactive_tab_font_style normal
tab_bar_background      #0d0d0d

# ── Scrollback ───────────────────────────────────
scrollback_lines        10000
scrollback_pager        less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ── Rendimiento ──────────────────────────────────
repaint_delay           8
input_delay             2
sync_to_monitor         yes

# ── Bell ─────────────────────────────────────────
enable_audio_bell       no
visual_bell_duration    0

# ── Misc ─────────────────────────────────────────
confirm_os_window_close 0
strip_trailing_spaces   smart
copy_on_select          no
shell_integration       enabled
allow_remote_control    yes

# ── Atajos de teclado ─────────────────────────────
# (kitty los carga sobre los defaults, no los reemplaza)
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0
map ctrl+shift+f5       load_config_file